name: Package Extension

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  package:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          zip ultrawide-shortcuts@lukewilde.co.uk.zip \
            extension.js prefs.js \
            positioning.js keybinding-conflicts.js drag-snap.js edge-snap.js \
            metadata.json \
            schemas/org.gnome.shell.extensions.ultrawide-shortcuts.gschema.xml

      - name: Validate bundle (shexli)
        run: |
          python3 -m pip install --quiet shexli==0.2.1
          shexli ultrawide-shortcuts@lukewilde.co.uk.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultrawide-shortcuts@lukewilde.co.uk
          path: ultrawide-shortcuts@lukewilde.co.uk.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ultrawide-shortcuts@lukewilde.co.uk.zip
